apiVersion: apps/v1
kind: Deployment
metadata:
  name: member-depl
  namespace: deploy-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: member
  template:
    metadata:
      labels:
        app: member
    spec:
      containers:
        - name: member-container
          image: member-service:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 8080

          resources:
            limits:
              cpu: "250m"
              memory: "500Mi"
            requests:
              cpu: "100m"
              memory: "250Mi"

          env:
            - name: DB_HOST
              value: "mysql-master-0.mysql-master.deploy-test-data.svc.cluster.local"
            - name: DB_PW
              value: "rootpass"

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: member-service
  namespace: deploy-test
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: member